<svg viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PFlash — speculative prefill compression in front of dflash, ~10× TTFT at 128K on a single RTX 3090">
  <defs>
    <linearGradient id="pf-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f0f0f"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="pf-glow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f0d040" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#f0d040" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="560" height="320" rx="12" fill="url(#pf-bg)" stroke="#222222" stroke-width="1"/>
  <rect x="1" y="1" width="558" height="140" rx="12" fill="url(#pf-glow)"/>

  <g font-family="'Inter', ui-sans-serif, system-ui, sans-serif" fill="#f0d040" font-size="10" font-weight="600" letter-spacing="2">
    <text x="28" y="42">PROJECT · 03</text>
  </g>

  <g>
    <text x="28" y="92" font-family="'Instrument Serif', Georgia, serif" font-size="44" fill="#e8e8ed" letter-spacing="-0.5">Luce PFlash</text>
    <text x="28" y="118" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#8888a0">Speculative prefill compression in front of dflash.</text>
  </g>

  <g stroke="#222222" stroke-width="1">
    <line x1="28" y1="152" x2="532" y2="152"/>
  </g>

  <g font-family="'Inter', ui-sans-serif, system-ui, sans-serif">
    <text x="28" y="178" font-size="11" fill="#55556a" letter-spacing="1">TTFT @ 128K</text>
    <text x="28" y="212" font-size="28" font-weight="700" fill="#e8e8ed">24.8 s</text>
    <text x="28" y="232" font-size="11" fill="#8888a0">vs ~257 s llama.cpp · same card</text>

    <text x="250" y="178" font-size="11" fill="#55556a" letter-spacing="1">SPEEDUP</text>
    <text x="250" y="212" font-size="28" font-weight="700" fill="#f0d040">~10×</text>
    <text x="250" y="232" font-size="11" fill="#8888a0">cold-vs-cold · NIAH preserved</text>

    <text x="410" y="178" font-size="11" fill="#55556a" letter-spacing="1">CONTEXT</text>
    <text x="410" y="212" font-size="28" font-weight="700" fill="#e8e8ed">128K</text>
    <text x="410" y="232" font-size="11" fill="#8888a0">on a single 24 GB card</text>
  </g>

  <g stroke="#f0d040" stroke-width="1" fill="none" opacity="0.35">
    <line x1="28" y1="260" x2="532" y2="260"/>
  </g>

  <g font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#8888a0">
    <text x="28" y="282">C++/CUDA daemon · 4 FlashPrefill kernels + BSA cutlass FA-2 · custom Qwen3-0.6B in ggml · no Python</text>
  </g>

  <g fill="#55556a" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="2">
    <text x="28" y="304">MIT · OPEN SOURCE</text>
    <text x="532" y="304" text-anchor="end" fill="#f0d040">READ →</text>
  </g>
</svg>
